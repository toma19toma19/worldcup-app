<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIFA ワールドカップ 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07090f;--bg2:#0c1220;--bg3:#111827;--bg4:#1a2540;
  --green:#00e676;--gm:rgba(0,230,118,.12);
  --gold:#f59e0b;--gom:rgba(245,158,11,.12);
  --red:#ef4444;--rm:rgba(239,68,68,.12);
  --blue:#3b82f6;
  --txt:#eef2ff;--txt2:#9bb5d0;--txt3:#6b87a8;
  --border:#1e2d45;--tab-h:64px;
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;overflow-x:hidden;font-size:18px;}

/* ── FLAG IMAGE ── */
.fi{border-radius:2px;display:inline-block;flex-shrink:0;background-size:cover;background-position:center;}
.fi-s {width:22px;height:16px;border-radius:2px;}
.fi-m {width:30px;height:22px;border-radius:2px;}
.fi-l {width:42px;height:31px;border-radius:3px;}
.fi-xl{width:54px;height:40px;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.fi-hero{width:76px;height:57px;border-radius:5px;box-shadow:0 4px 20px rgba(0,0,0,.4);}

/* ── HEADER ── */
.hdr{background:#07090f;border-bottom:1px solid rgba(0,230,118,.18);padding:0 16px;position:sticky;top:0;z-index:100;overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,60,25,.5) 0%,transparent 60%);pointer-events:none;}
.hdr-inner{max-width:720px;margin:0 auto;height:62px;display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.hdr-ball{width:36px;height:36px;background:linear-gradient(135deg,#fff 0%,#dde 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px rgba(0,230,118,.3);flex-shrink:0;}
.hdr-text{flex:1;}
.hdr-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.2px;}
.hdr-sub{font-size:13px;color:var(--txt2);margin-top:1px;}
.countdown{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);border-radius:11px;padding:7px 11px;text-align:center;flex-shrink:0;}
.countdown .days{font-size:22px;font-weight:900;color:var(--green);line-height:1;font-variant-numeric:tabular-nums;}
.countdown .lbl{font-size:11px;color:var(--txt2);margin-top:2px;font-weight:600;letter-spacing:.3px;}
/* ── REFRESH ── */
.refresh-btn{background:none;border:1px solid rgba(0,230,118,.3);border-radius:9px;color:var(--green);padding:6px 10px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.refresh-btn:hover{background:rgba(0,230,118,.1);}
.refresh-btn:active{opacity:.7;}
.refresh-btn.spinning .ri{display:inline-block;animation:spin 1s linear infinite;}
.ri{display:inline-block;}
.last-updated{font-size:11px;color:var(--txt3);text-align:center;padding:3px 14px 0;}

/* ── TABS ── */
.tab-nav{position:fixed;bottom:0;left:0;right:0;background:#07090f;border-top:1px solid var(--border);display:flex;height:var(--tab-h);z-index:200;padding:0 6px;gap:2px;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--txt3);cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;border-radius:10px;padding:5px 0;position:relative;}
.tab-btn::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%) scaleX(0);width:28px;height:2px;background:var(--green);border-radius:0 0 2px 2px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.tab-btn.active{color:var(--green);}
.tab-btn.active::after{transform:translateX(-50%) scaleX(1);}
.tab-icon{font-size:22px;}
.tab-lbl{font-size:12px;font-weight:700;}

/* ── MAIN ── */
.main{max-width:720px;margin:0 auto;padding:12px 14px calc(var(--tab-h) + 12px);}
.view{display:none;}.view.active{display:block;}

/* ── SCROLL ROW ── */
.scroll-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-row::-webkit-scrollbar{display:none;}

/* ── CHIPS ── */
.chip{flex-shrink:0;padding:8px 16px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:15px;font-weight:700;color:var(--txt2);transition:all .18s;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.chip.active{background:var(--green);border-color:var(--green);color:#000;}

/* ── DATE CHIPS ── */
.date-chip{flex-shrink:0;padding:9px 13px;border-radius:13px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .18s;-webkit-tap-highlight-color:transparent;min-width:52px;}
.date-chip.active{background:var(--green);border-color:var(--green);}
.dc-dow{font-size:11px;color:var(--txt3);display:block;font-weight:700;letter-spacing:.5px;}
.dc-day{font-size:22px;font-weight:900;display:block;line-height:1.1;}
.dc-mon{font-size:11px;color:var(--txt3);display:block;}
.date-chip.active .dc-dow,.date-chip.active .dc-mon{color:rgba(0,0,0,.55);}
.date-chip.active .dc-day{color:#000;}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:13px;color:var(--txt2);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── MATCH CARD ── */
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:15px;margin-bottom:10px;cursor:pointer;overflow:hidden;transition:border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.mc:active{transform:scale(.985);}
.mc:hover{border-color:rgba(0,230,118,.3);}
.mc-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 0;}
.badge{font-size:13px;padding:3px 10px;border-radius:9px;font-weight:800;}
.badge.group{background:var(--gm);color:var(--green);}
.badge.knockout{background:var(--gom);color:var(--gold);}
.badge.final{background:var(--rm);color:var(--red);}
.mc-venue-top{font-size:13px;color:var(--txt2);}
.mc-body{display:flex;align-items:center;padding:13px 14px;gap:6px;}
.mc-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;}
.mc-name{font-size:16px;font-weight:700;text-align:center;line-height:1.2;}
.mc-mid{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:76px;}
.mc-score{display:flex;align-items:center;gap:4px;}
.mc-snum{font-size:34px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.mc-sep{font-size:22px;color:var(--txt3);margin-bottom:1px;}
.mc-time{font-size:15px;font-weight:800;color:var(--txt);}
.mc-status{font-size:13px;padding:3px 10px;border-radius:7px;font-weight:700;}
.st-upcoming{background:var(--bg4);color:var(--txt3);}
.st-live{background:var(--red);color:#fff;animation:blink 1.4s infinite;}
.st-fin{background:var(--gm);color:var(--green);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;}}
.mc-foot{padding:8px 14px 11px;font-size:14px;color:var(--txt2);border-top:1px solid var(--border);display:flex;align-items:center;gap:3px;}

/* ── GROUP CARD ── */
.gc{background:var(--bg2);border:1px solid var(--border);border-radius:15px;margin-bottom:12px;overflow:hidden;}
.gc-head{background:linear-gradient(135deg,#071a10,#0a1220);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;}
.gc-name{font-size:18px;font-weight:900;color:var(--green);}
.gc-flags{display:flex;gap:5px;align-items:center;}
table.standings{width:100%;border-collapse:collapse;}
.standings th{font-size:13px;color:var(--txt2);font-weight:800;text-transform:uppercase;padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);}
.standings th:first-child{text-align:left;padding-left:13px;}
.standings td{padding:12px 8px;text-align:center;border-bottom:1px solid rgba(30,45,69,.6);font-size:15px;color:var(--txt);}
.standings td:first-child{text-align:left;padding-left:0;}
.standings tr:last-child td{border-bottom:none;}
.standings tbody tr{cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.standings tbody tr:active{background:rgba(0,230,118,.05);}
.standings tbody tr:hover{background:rgba(0,230,118,.03);}
.standings tbody tr:nth-child(1) td:first-child,
.standings tbody tr:nth-child(2) td:first-child{border-left:3px solid var(--green);}
.standings tbody tr:nth-child(3) td:first-child{border-left:3px solid rgba(245,158,11,.5);}
.team-cell{display:flex;align-items:center;gap:8px;padding-left:10px;}
.pos{width:18px;font-size:14px;font-weight:800;color:var(--txt3);}
.pos.q{color:var(--green);}.pos.q3{color:var(--gold);}
.tbl-name{font-size:13px;font-weight:700;}
.pts-cell{font-weight:900;color:var(--txt);font-size:16px;}
.gc-matches{padding:10px 14px;border-top:1px solid var(--border);}
.gc-mtitle{font-size:13px;color:var(--txt2);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.gc-match-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(30,45,69,.5);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.gc-match-row:last-child{border-bottom:none;}
.gc-match-row:active{opacity:.6;}
.gm-teams{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;}
.gm-score{font-size:15px;font-weight:900;color:var(--green);padding:2px 10px;background:var(--gm);border-radius:7px;}
.gm-date{font-size:14px;color:var(--txt2);}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding:10px 13px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);}
.leg-item{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--txt);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

/* ── TOURNAMENT ── */
.phase-tabs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px;}
.phase-tabs::-webkit-scrollbar{display:none;}
.phase-chip{flex-shrink:0;padding:9px 16px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:800;color:var(--txt2);transition:all .18s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.phase-chip.active{background:var(--gold);border-color:var(--gold);color:#000;}
.ko-card{background:var(--bg2);border:1px solid var(--border);border-radius:15px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.ko-card:hover{border-color:rgba(245,158,11,.3);}
.ko-card:active{transform:scale(.985);}
.ko-head{display:flex;justify-content:space-between;font-size:13px;color:var(--txt3);padding:10px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#150f02,#0a1220);}
.ko-head-phase{font-weight:800;color:var(--gold);}
.ko-team-row{display:flex;align-items:center;gap:11px;padding:13px 14px;}
.ko-team-row+.ko-team-row{border-top:1px solid var(--border);}
.ko-name-wrap{flex:1;}
.ko-name{font-size:17px;font-weight:800;}
.ko-name-sub{font-size:12px;color:var(--txt3);margin-top:2px;}
.ko-score{font-size:28px;font-weight:900;min-width:28px;text-align:right;font-variant-numeric:tabular-nums;}
.ko-foot{padding:9px 14px;border-top:1px solid var(--border);font-size:14px;color:var(--txt2);display:flex;align-items:center;gap:4px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(8px);}
.overlay.open{display:flex;}
.modal{background:var(--bg2);width:100%;max-width:720px;margin:0 auto;border-radius:22px 22px 0 0;padding:0 0 32px;max-height:90vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.32,.72,0,1);position:relative;border:1px solid var(--border);border-bottom:none;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0;}
.modal-x{position:absolute;top:13px;right:15px;background:var(--bg4);border:none;color:var(--txt2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.modal-x:hover{background:var(--bg3);}
.mi{padding:0 17px;}
.m-sec{font-size:12px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 9px;}
.m-phase{text-align:center;font-size:13px;color:var(--txt3);font-weight:700;margin-top:14px;margin-bottom:3px;}
.m-datetime{text-align:center;font-size:15px;color:var(--txt2);margin-bottom:14px;}
.m-vs{display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:14px;padding:18px 10px;}
.m-team{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
.m-tname{font-size:17px;font-weight:800;line-height:1.2;}
.m-conf{font-size:13px;color:var(--txt3);}
.m-scorebox{text-align:center;min-width:78px;}
.m-score{display:flex;align-items:center;justify-content:center;gap:6px;font-size:48px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.m-sep{color:var(--txt3);font-size:28px;}
.m-prestart{font-size:26px;color:var(--txt3);font-weight:900;margin:4px 0;}
.m-vs-lbl{font-size:14px;color:var(--txt3);margin-top:5px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.info-item{background:var(--bg3);border-radius:11px;padding:11px 12px;}
.info-lbl{font-size:13px;color:var(--txt2);margin-bottom:4px;font-weight:700;}
.info-val{font-size:16px;font-weight:800;}
.tm-header{text-align:center;padding:20px 0 16px;}
.tm-name{font-size:26px;font-weight:900;margin-top:10px;}
.tm-sub{font-size:15px;color:var(--txt2);margin-top:4px;}
.tm-group-badge{display:inline-block;margin-top:10px;padding:5px 18px;border-radius:20px;background:var(--gm);color:var(--green);font-size:14px;font-weight:800;}
.tm-match-row{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:var(--bg3);border-radius:10px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.tm-match-row:active{opacity:.6;}
.squad-row{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg3);border-radius:10px;margin-bottom:6px;}
.p-num{width:30px;height:30px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;}
.p-info{flex:1;}
.p-name{font-size:16px;font-weight:700;}
.p-pos{font-size:12px;color:var(--txt3);margin-top:1px;font-weight:700;}
.p-club{font-size:14px;color:var(--txt2);}

/* ── TAPPABLE ── */
.tappable{-webkit-tap-highlight-color:transparent;}
.tappable:active{opacity:.75;}

/* ── BRACKET ── */
.bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.bracket-wrap::-webkit-scrollbar{height:4px;}
.bracket-wrap::-webkit-scrollbar-track{background:transparent;}
.bracket-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.bm{background:var(--bg2);border:1px solid #2a3f60;border-radius:9px;overflow:hidden;cursor:pointer;transition:border-color .15s;width:100%;}
.bm:hover{border-color:rgba(0,230,118,.5);}
.bm:active{opacity:.8;}
.bm-final{border-color:rgba(245,158,11,.6) !important;background:linear-gradient(135deg,rgba(245,158,11,.08),var(--bg2));}
.bm-final:hover{border-color:var(--gold) !important;}
.bm-empty{opacity:.25;pointer-events:none;}
.bm-row{display:flex;align-items:center;padding:5px 7px;gap:5px;min-height:28px;}
.bm-row+.bm-row{border-top:1px solid var(--border);}
.bm-win{background:rgba(0,230,118,.08);}
.bm-name{flex:1;font-size:12px;font-weight:700;color:var(--txt);line-height:1.3;word-break:break-all;}
.bm-score{font-size:13px;font-weight:900;color:var(--txt);font-variant-numeric:tabular-nums;min-width:14px;text-align:right;}
.bconn-arm{flex:1;position:relative;}
.bconn-arm::before{content:'';position:absolute;top:25%;left:0;width:50%;height:50%;border-top:2px solid #3a5580;border-right:2px solid #3a5580;border-bottom:2px solid #3a5580;box-sizing:border-box;}
.bconn-arm::after{content:'';position:absolute;top:calc(50% - 1px);left:50%;width:50%;height:2px;background:#3a5580;}

/* ── COUNTDOWN TIMER ── */
.mc-countdown{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px 9px;border-top:1px solid var(--border);background:rgba(0,230,118,.04);}
.cd-unit{display:flex;flex-direction:column;align-items:center;min-width:36px;}
.cd-num{font-size:18px;font-weight:900;color:var(--green);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.cd-lbl{font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:.5px;margin-top:1px;}
.cd-sep{font-size:16px;font-weight:900;color:var(--green);margin-bottom:6px;opacity:.6;}
.cd-soon{font-size:13px;font-weight:800;color:var(--gold);padding:6px 14px 8px;text-align:center;border-top:1px solid var(--border);background:rgba(245,158,11,.06);}

/* ── PREDICTION ── */
.pred-fab{position:fixed;bottom:calc(var(--tab-h)+16px);right:16px;z-index:300;background:var(--gold);color:#000;border:none;border-radius:50px;padding:11px 18px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,.4);-webkit-tap-highlight-color:transparent;display:none;align-items:center;gap:6px;}
.pred-fab.active{background:var(--green);box-shadow:0 4px 20px rgba(0,230,118,.4);}
.pred-fab.show{display:flex;}
.pred-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--gold);}
.pred-team-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg3);border-radius:10px;margin-bottom:6px;}
.pred-rank-b{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
.pr1,.pr2{background:var(--gm);color:var(--green);}
.pr3{background:var(--gom);color:var(--gold);}
.pr4{background:var(--bg4);color:var(--txt3);}
.pred-arrows{display:flex;gap:4px;margin-left:auto;}
.pred-arr{background:var(--bg4);border:1px solid var(--border);color:var(--txt2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.pred-arr:disabled{opacity:.2;pointer-events:none;}
.bm-pred-win{background:rgba(0,230,118,.12)!important;}
.bm-pred-win .bm-name{color:var(--green);}
.pred-hint{font-size:10px;color:var(--txt3);text-align:center;padding:3px;border-top:1px solid var(--border);}
.pred-tag{font-size:9px;color:var(--gold);font-weight:800;margin-left:2px;vertical-align:middle;}
.pred-legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 14px;font-size:12px;color:var(--txt2);border-top:1px solid var(--border);}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:60px 20px;}
.loading-icon{font-size:48px;display:block;margin-bottom:16px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:17px;color:var(--txt2);}
.loading-src{font-size:14px;color:var(--txt3);margin-top:8px;}
.error-box{background:var(--rm);border:1px solid rgba(239,68,68,.3);border-radius:13px;padding:20px;text-align:center;margin:20px 0;}
.error-box p{color:var(--red);font-size:16px;margin-bottom:8px;}
.retry-btn{background:var(--red);color:#fff;border:none;padding:10px 22px;border-radius:9px;cursor:pointer;font-size:15px;font-weight:800;}

<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-ball">⚽</div>
    <div class="hdr-text">
      <div class="hdr-title">FIFA ワールドカップ 2026™</div>
      <div class="hdr-sub">🇺🇸 USA &nbsp;·&nbsp; 🇨🇦 Canada &nbsp;·&nbsp; 🇲🇽 Mexico &nbsp;|&nbsp; 6/11–7/19</div>
    </div>
    <div class="countdown">
      <div class="days" id="cntDays">-</div>
      <div class="lbl" id="cntLbl">日後開幕</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" title="データを更新">
      <span class="ri">🔄</span>
    </button>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
  <div id="fdStatus" style="font-size:11px;color:var(--gold);text-align:center;padding:0 14px 3px;">
    ⚡ ライブスコア有効 (ESPN Core API)
  </div>
</header>

<main class="main">
  <div id="view-schedule" class="view active">
    <div id="scheduleLoading" class="loading">
      <span class="loading-icon">⚽</span>
      <div class="loading-txt">データを取得中...</div>
      <div class="loading-src">openfootball / worldcup.json</div>
    </div>
    <div id="scheduleReady" style="display:none">
      <div class="scroll-row" id="dateScroll"></div>
      <div id="matchList"></div>
    </div>
  </div>
  <div id="view-groups" class="view">
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>ラウンド32進出（各組上位2）</div>
      <div class="leg-item"><div class="leg-dot" style="background:rgba(245,158,11,.7)"></div>3位争い対象</div>
    </div>
    <div class="scroll-row" id="groupFilter"></div>
    <div id="groupsContainer"></div>
  </div>
  <div id="view-tournament" class="view">
    <div id="tournamentContent"></div>
  </div>
  <div id="view-predict" class="view">
    <div id="predictContent"></div>
  </div>
</main>

<nav class="tab-nav">
  <button class="tab-btn active" id="tab-schedule" onclick="switchTab('schedule')">
    <span class="tab-icon">📅</span><span class="tab-lbl">スケジュール</span>
  </button>
  <button class="tab-btn" id="tab-groups" onclick="switchTab('groups')">
    <span class="tab-icon">📊</span><span class="tab-lbl">グループ</span>
  </button>
  <button class="tab-btn" id="tab-tournament" onclick="switchTab('tournament')">
    <span class="tab-icon">🏆</span><span class="tab-lbl">トーナメント</span>
  </button>
  <button class="tab-btn" id="tab-predict" onclick="switchTab('predict')">
    <span class="tab-icon">🔮</span><span class="tab-lbl">予想</span>
  </button>
</nav>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="mi" id="modalContent"></div>
  </div>
</div>

// 現地日時 → JST日付・時刻に変換して返す
function toJSTDateTime(localDateStr, rawTimeStr) {
  if (!rawTimeStr || !localDateStr) return {date: localDateStr||'', time: ''};
  const m = rawTimeStr.trim().match(/^(\d{1,2}):(\d{2})\s*UTC([+-]\d+)/i);
  if (!m) return {date: localDateStr, time: rawTimeStr.split(' ')[0]};
  const lh = parseInt(m[1]), lmin = parseInt(m[2]), offset = parseInt(m[3]);
  const totalMins = lh * 60 + lmin + (9 - offset) * 60;
  const norm = ((totalMins % 1440) + 1440) % 1440;
  const jh = Math.floor(norm / 60), jmin = norm % 60;
  const dayOffset = Math.floor(totalMins / 1440);
  const base = new Date(localDateStr + 'T00:00:00');
  base.setDate(base.getDate() + dayOffset);
  const yyyy = base.getFullYear();
  const mm = String(base.getMonth()+1).padStart(2,'0');
  const dd = String(base.getDate()).padStart(2,'0');
  return {
    date: `${yyyy}-${mm}-${dd}`,
    time: `${String(jh).padStart(2,'0')}:${String(jmin).padStart(2,'0')} JST`,
  };
}

function cityToVenueKey(city) {
  if (!city) return null;
  const c = city.toLowerCase();
  if (c.includes('mexico city')||c.includes('ciudad de méxico')) return 'Azteca';
  if (c.includes('monterrey')) return 'BBVA';
  if (c.includes('guadalajara')) return 'Akron';
  if (c.includes('dallas')||c.includes('arlington')) return 'ATT';
  if (c.includes('los angeles')||c.includes('inglewood')) return 'SoFi';
  if (c.includes('san francisco')||c.includes('santa clara')) return 'Levis';
  if (c.includes('kansas city')) return 'Arrowhead';
  if (c.includes('miami')) return 'HardRock';
  if (c.includes('atlanta')) return 'MBenz';
  if (c.includes('philadelphia')) return 'Lincoln';
  if (c.includes('boston')||c.includes('foxboro')) return 'Gillette';
  if (c.includes('seattle')) return 'Lumen';
  if (c.includes('new york')||c.includes('east rutherford')||c.includes('new jersey')) return 'MetLife';
  if (c.includes('vancouver')) return 'BCPlace';
  if (c.includes('toronto')) return 'BMO';
  return null;
}

function roundToPhase(round) {
  if (!round) return 'r32';
  const r = round.toLowerCase();
  if (r.includes('matchday')) return 'group';
  if (r.includes('round of 32')||r.includes('knockout round')) return 'r32';
  if (r.includes('round of 16')) return 'r16';
  if (r.includes('quarter')) return 'qf';
  if (r.includes('semi')) return 'sf';
  if (r.includes('third')||r.includes('3rd')||r.includes('place playoff')) return '3rd';
  if (r.includes('final')) return 'final';
  return 'r32';
}

// football-data.org からライブスコアを取得し allMatches に反映
async function fetchAndMergeLiveScores() {
  if (!FD_API_KEY) return false;
  try {
    const resp = await fetch(FD_URL, {
      headers: {'X-Auth-Token': FD_API_KEY},
      cache: 'no-cache',
    });
    if (!resp.ok) return false;
    const data = await resp.json();
    let changed = false;
    (data.matches || []).forEach(fm => {
      const hk = resolveFdTeam(fm.homeTeam);
      const ak = resolveFdTeam(fm.awayTeam);
      if (!hk || !ak) return;
      const m = allMatches.find(x => x.home === hk && x.away === ak);
      if (!m) return;
      const st = fm.status || 'SCHEDULED';
      const isLive = st === 'IN_PLAY' || st === 'PAUSED';
      // ライブ中はfullTime→halfTimeの順でスコアを取得
      const rawHs = fm.score?.fullTime?.home ?? (isLive ? fm.score?.halfTime?.home ?? null : null);
      const rawAs = fm.score?.fullTime?.away ?? (isLive ? fm.score?.halfTime?.away ?? null : null);
      const newHs = (st === 'FINISHED' || isLive) ? rawHs : null;
      const newAs = (st === 'FINISHED' || isLive) ? rawAs : null;
      if (m.hs !== newHs || m.as !== newAs || m.liveStatus !== st) {
        m.hs = newHs;
        m.as = newAs;
        m.liveStatus = st;
        changed = true;
      }
    });
    return changed;
  } catch (e) {
    return false;
  }
}

// ESPN Core API からスコア・ステータスを取得し allMatches に反映
async function fetchEspnCoreScores() {
  try {
    // 大会開始日から今日までの日付リストを生成
    const today = new Date();
    const start = new Date(ESPN_WC_START);
    const dates = [];
    for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
      const y = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      dates.push(`${y}${mm}${dd}`);
    }

    // 各日付のスコアボードからイベント情報を取得
    const eventList = [];
    await Promise.all(dates.map(async dateStr => {
      try {
        const r = await fetch(`${ESPN_SITE_BASE}/scoreboard?dates=${dateStr}`, {cache:'no-cache'});
        if (!r.ok) return;
        const data = await r.json();
        (data.events||[]).forEach(ev => {
          const comp = ev.competitions?.[0];
          if (!comp) return;
          const comps = comp.competitors||[];
          if (comps.length < 2) return;
          const home = comps.find(c => c.homeAway === 'home');
          const away = comps.find(c => c.homeAway === 'away');
          if (!home || !away) return;
          eventList.push({
            eventId: ev.id,
            homeId:   home.id,
            homeAbbr: home.team?.abbreviation,
            awayId:   away.id,
            awayAbbr: away.team?.abbreviation,
          });
        });
      } catch(e) {}
    }));

    if (!eventList.length) return false;

    // 各イベントのステータス＋スコアを ESPN Core API から並列取得
    let changed = false;
    await Promise.all(eventList.map(async ev => {
      try {
        const base = `${ESPN_CORE_BASE}/events/${ev.eventId}/competitions/${ev.eventId}`;
        const [stR, hsR, asR] = await Promise.all([
          fetch(`${base}/status`,                           {cache:'no-cache'}),
          fetch(`${base}/competitors/${ev.homeId}/score`,   {cache:'no-cache'}),
          fetch(`${base}/competitors/${ev.awayId}/score`,   {cache:'no-cache'}),
        ]);
        if (!stR.ok) return;
        const stData = await stR.json();
        const stName = stData.type?.name || '';
        const state  = stData.type?.state || '';

        // 未開始はスキップ
        if (state === 'pre') return;

        // ステータスを内部形式にマッピング
        let liveStatus = 'SCHEDULED';
        if (state === 'post' || stName.includes('FINAL') || stName.includes('FULL_TIME')) {
          liveStatus = 'FINISHED';
        } else if (state === 'in') {
          liveStatus = stName === 'STATUS_HALFTIME' ? 'PAUSED' : 'IN_PLAY';
        }
        if (liveStatus === 'SCHEDULED') return;

        // スコアを取得
        let hs = null, as_ = null;
        if (hsR.ok && asR.ok) {
          const hsData = await hsR.json();
          const asData = await asR.json();
          if (hsData.value != null) hs  = Math.round(hsData.value);
          if (asData.value != null) as_ = Math.round(asData.value);
        }

        // 内部チームキーに変換
        const hk = ESPN_TLA[ev.homeAbbr];
        const ak = ESPN_TLA[ev.awayAbbr];
        if (!hk || !ak) return;

        // allMatches に反映
        const match = allMatches.find(x => x.home === hk && x.away === ak);
        if (!match) return;

        // ESPN event ID・チームIDを保存（得点者取得に使用）
        match.espnEventId = ev.eventId;
        match.espnHomeId  = ev.homeId;
        match.espnAwayId  = ev.awayId;

        const newHs = (hs  != null) ? hs  : null;
        const newAs = (as_ != null) ? as_ : null;
        if (match.hs !== newHs || match.as !== newAs || match.liveStatus !== liveStatus) {
          match.hs = newHs;
          match.as = newAs;
          match.liveStatus = liveStatus;
          changed = true;
        }
      } catch(e) {}
    }));

    return changed;
  } catch(e) {
    return false;
  }
}

function processData(data) {
  const tempGroups = {};
  const gMatches = [];
  const kMatches = [];
  let uid = 1;
  let koNum = {r32:0,r16:0,qf:0,sf:0,'3rd':0,final:0};

  (data.matches||[]).forEach(m => {
    const phase = roundToPhase(m.round);
    const isGroup = phase === 'group';
    const md = isGroup ? parseInt((m.round||'').replace(/\D/g,''))||1 : null;
    const g = isGroup ? (m.group||'').replace('Group ','') : null;
    const vKey = cityToVenueKey(m.ground);
    const h = resolveTeam(m.team1);
    const a = resolveTeam(m.team2);
    const timeLocal = m.time ? m.time.split(' ')[0] : '';
    const jstDT = toJSTDateTime(m.date, m.time);

    if (isGroup && h && a) {
      if (!tempGroups[g]) tempGroups[g] = [];
      if (!tempGroups[g].includes(h)) tempGroups[g].push(h);
      if (!tempGroups[g].includes(a)) tempGroups[g].push(a);
      gMatches.push({
        id:uid++,type:'group',group:g,md,
        date:m.date,jstDate:jstDT.date||m.date,time:timeLocal,jst:jstDT.time,
        venue:vKey,venueCity:m.ground,
        home:h,away:a,
        hs:m.score1!=null?m.score1:null,
        as:m.score2!=null?m.score2:null,
      });
    } else if (!isGroup) {
      koNum[phase] = (koNum[phase]||0)+1;
      const hk = resolveTeam(m.team1);
      const ak = resolveTeam(m.team2);
      kMatches.push({
        id:uid++,type:phase,phase,
        matchNum:koNum[phase],
        apiNum:m.num||null,
        date:m.date,jstDate:jstDT.date||m.date,time:timeLocal,jst:jstDT.time,
        venue:vKey,venueCity:m.ground,
        home:hk||'TBD',away:ak||'TBD',
        homeLabel:!hk?m.team1:null,
        awayLabel:!ak?m.team2:null,
        hs:m.score1!=null?m.score1:null,
        as:m.score2!=null?m.score2:null,
      });
    }
  });

  GROUPS = tempGroups;
  groupMatches = gMatches;
  koMatches = kMatches;
  allMatches = [...gMatches,...kMatches];
}

function kickoffTimestamp(m) {
  if (!m.jstDate || !m.jst) return null;
  const timeMatch = m.jst.match(/^(\d{2}):(\d{2})/);
  if (!timeMatch) return null;
  const [,hh,mm] = timeMatch;
  // JSTはUTC+9
  return new Date(`${m.jstDate}T${hh}:${mm}:00+09:00`).getTime();
}

  const hFi = isTBD?'❓':fi(h.code,'fi-xl');

  return `<div class="mc" onclick="openMatchModal(${m.id})">
    <div class="mc-hdr">
      <span class="badge ${badgeClass(m.type)}">${m.type==='group'?'グループ '+m.group+' MD'+m.md:phaseName(m.type)}</span>

    </div>

  </div>`;
}

// グループスタンディングを実際の試合結果から計算
function computeGroupStandings(g) {
  const teams = GROUPS[g] || [];
  const stats = {};
  teams.forEach(tk => {
    stats[tk] = {team:tk, played:0, won:0, drawn:0, lost:0, gf:0, ga:0, gd:0, pts:0};
  });
  groupMatches.filter(m => m.group === g && m.hs !== null && m.liveStatus === 'FINISHED').forEach(m => {
    const h = stats[m.home], a = stats[m.away];
    if (!h || !a) return;
    h.played++; a.played++;
    h.gf += m.hs; h.ga += m.as;
    a.gf += m.as; a.ga += m.hs;
    h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
    if (m.hs > m.as)      { h.won++; h.pts += 3; a.lost++; }
    else if (m.hs < m.as) { a.won++; a.pts += 3; h.lost++; }
    else                   { h.drawn++; h.pts++; a.drawn++; a.pts++; }
  });
  // 勝点 → 得失点差 → 総得点 → 直接対決（簡易） → チーム名
  return Object.values(stats).sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd  !== a.gd)  return b.gd  - a.gd;
    if (b.gf  !== a.gf)  return b.gf  - a.gf;
    return a.team.localeCompare(b.team);
  });
}

// 次ラウンドの試合依存関係からブラケット表示順を構築
function buildBracketOrder(phase, nextPhaseMatches) {
  const matches = koMatches.filter(m=>m.phase===phase);
  if (!nextPhaseMatches || !nextPhaseMatches.length)
    return matches.sort((a,b)=>a.matchNum-b.matchNum);
  const result = [], used = new Set();
  nextPhaseMatches.forEach(nm => {
    [nm.homeLabel, nm.awayLabel].forEach(label => {
      const wm = label && label.match(/^W(\d+)$/);
      if (wm) {
        const feeder = matchByApiNum[parseInt(wm[1])];
        if (feeder && feeder.phase===phase && !used.has(feeder.apiNum)) {
          result.push(feeder); used.add(feeder.apiNum);
        }
      }
    });
  });
  matches.forEach(m=>{ if(!used.has(m.apiNum)) result.push(m); });
  return result;
}
function slotDisplay(label, effKey, isPred, confirmed) {
  // センチネル（3位候補）検出 - 次ラウンドへの伝播でも複数フラグ維持
  const sentinel = effKey && effKey.startsWith('__3RD__') ? effKey.slice(7) : null;
  const thirdLabel = sentinel || (label && label.match(/^3[A-L]/) ? label : null);
  if(thirdLabel){
    const r=third3Flags(thirdLabel);
    if(r) return {
      nameHtml:`<span style="display:flex;flex-wrap:wrap;gap:2px;align-items:center">${r.flags.join('')}<span style="font-size:10px;color:var(--gold);font-weight:700;margin-left:2px">3位候補</span></span>`,
      clickable:true, tag:'', hideLeadFlag:true
    };
  }
  if(!effKey) return {nameHtml:`<span style="color:var(--txt3);font-size:11px">未定</span>`, clickable:false, tag:''};
  const t=team(effKey);
  const tag=isPred&&!confirmed?`<span class="pred-tag">予</span>`:'';
  return {nameHtml:`${t.n}${tag}`, clickable:!confirmed, tag};
}

function bracketMatchCard(m, isFinal) {
  const eh=getEffTeam(m,'home'), ea=getEffTeam(m,'away');
  const ht=eh.key?team(eh.key):null, at=ea.key?team(ea.key):null;
  const hName=ht?ht.n:(m.homeLabel||'未定'), aName=at?at.n:(m.awayLabel||'未定');
  const hFi=ht&&ht.code?fi(ht.code,'fi-s'):'', aFi=at&&at.code?fi(at.code,'fi-s'):'';
  const confirmed=m.hs!==null;
  const realW=realMatchWinner(m);
  const predW=realW||PRED.knockout[m.phase+'_'+m.matchNum]||null;
  const hWin=confirmed?m.hs>m.as:(predW&&predW===eh.key);
  const aWin=confirmed?m.as>m.hs:(predW&&predW===ea.key);
  const hSlot=slotDisplay(m.homeLabel,eh.key,eh.isPred,confirmed);
  const aSlot=slotDisplay(m.awayLabel,ea.key,ea.isPred,confirmed);
  const hClick=!confirmed&&eh.key?`onclick="event.stopPropagation();setPredWinner('${m.phase}',${m.matchNum},'${eh.key}')"`:'';
  const aClick=!confirmed&&ea.key?`onclick="event.stopPropagation();setPredWinner('${m.phase}',${m.matchNum},'${ea.key}')"`:'';
  const canPick=!confirmed&&eh.key&&ea.key;
  return `<div class="bm${isFinal?' bm-final':''}" onclick="openMatchModal(${m.id})">
    <div class="bm-row${hWin?(confirmed?' bm-win':' bm-pred-win'):''}${hSlot.clickable?' tappable':''}" ${hClick}>
      ${hSlot.hideLeadFlag?'':hFi}<span class="bm-name">${hSlot.nameHtml}</span><span class="bm-score">${confirmed?m.hs:(hWin?(isFinal?'🏆':'✓'):'')}</span>
    </div>
    <div class="bm-row${aWin?(confirmed?' bm-win':' bm-pred-win'):''}${aSlot.clickable?' tappable':''}" ${aClick}>
      ${aSlot.hideLeadFlag?'':aFi}<span class="bm-name">${aSlot.nameHtml}</span><span class="bm-score">${confirmed?m.as:(aWin?(isFinal?'🏆':'✓'):'')}</span>
    </div>
  </div>`;
}

function clearGroupAffectedPreds(g) {
  // グループGに関係するR32の予想のみ削除
  let anyCleared = false;
  const re = new RegExp(`^[1-4]${g}(/|$)`);
  koMatches.forEach(m => {
    if (m.phase !== 'r32') return;
    if (re.test(m.homeLabel||'') || re.test(m.awayLabel||'')) {
      const k = `r32_${m.matchNum}`;
      if (PRED.knockout[k] !== undefined) {
        delete PRED.knockout[k];
        anyCleared = true;
      }
    }
  });
  // R32が変わった場合のみ下流(R16以降)も削除
  if (anyCleared) {
    ['r16','qf','sf','final'].forEach(phase =>
      Object.keys(PRED.knockout).filter(k=>k.startsWith(phase+'_')).forEach(k=>delete PRED.knockout[k])
    );
  }
}

function moveTeamPred(g,idx,dir){
  const arr=PRED.groups[g];if(!arr)return;
  const ni=idx+dir;if(ni<0||ni>=arr.length)return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
  clearGroupAffectedPreds(g);
  savePred();
  renderPredictGroups();
}

// プレイデータからゴール情報を解析
function parseGoalFromPlay(play, espnHomeId) {
  const typeText = (play.type?.text || play.type?.abbreviation || play.text || '').toLowerCase();
  if (!typeText.includes('goal') && !typeText.includes('scored')) return null;
  const athletes = play.participants || play.athletesInvolved || [];
  const name = athletes
    .map(a => a.athlete?.displayName || a.displayName || a.fullName || '')
    .filter(Boolean).join(', ');
  if (!name) return null;
  const clock = play.clock?.displayValue || play.wallclock || '';
  const teamId = String(play.team?.id || play.team?.$ref?.match(/\/teams\/(\d+)/)?.[1] || '');
  const isHome = espnHomeId ? (teamId === String(espnHomeId)) : null;
  const own = typeText.includes('own');
  return { name, clock, isHome, own };
}

async function fetchAndShowScorers(eventId, homeKey, awayKey, espnHomeId, espnAwayId) {
  const el = document.getElementById('m-scorers');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;color:var(--txt3);font-size:12px;padding:8px">⏳ 得点者を読み込み中…</div>';

  let goals = [];

  // ① ESPN Core API plays エンドポイント
  try {
    const coreUrl = `${ESPN_CORE_BASE}/events/${eventId}/competitions/${eventId}/plays?limit=200`;
    const res = await fetch(coreUrl);
    if (res.ok) {
      const data = await res.json();
      let plays = data.items || [];

      // インラインデータがない場合は $ref を並列フェッチ（最大100件）
      if (plays.length > 0 && !plays.some(p => p.type)) {
        const refPlays = plays.filter(p => p.$ref).slice(0, 100);
        plays = (await Promise.all(
          refPlays.map(p => fetch(p.$ref).then(r => r.ok ? r.json() : null).catch(() => null))
        )).filter(Boolean);
      }

      for (const play of plays) {
        const g = parseGoalFromPlay(play, espnHomeId);
        if (g) goals.push(g);
      }
    }
  } catch(_) {}

  // ② ESPN Site API summary（フォールバック）
  if (goals.length === 0) {
    try {
      const siteUrl = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`;
      const res = await fetch(siteUrl);
      if (res.ok) {
        const data = await res.json();
        const comps = data?.header?.competitions;
        const comp = Array.isArray(comps) ? comps[0] : null;
        const details = comp?.details || data?.scoringPlays || [];
        const homeCompId = String(comp?.competitors?.find(c=>c.homeAway==='home'||c.order===0)?.id || '');

        for (const d of details) {
          const typeText = (d.type?.text || '').toLowerCase();
          if (!typeText.includes('goal')) continue;
          const athletes = d.athletesInvolved || [];
          const name = athletes.map(a=>a.displayName||'').filter(Boolean).join(', ');
          if (!name) continue;
          const clock = d.clock?.displayValue || '';
          const teamId = String(d.team?.id || '');
          const isHome = homeCompId ? teamId === homeCompId : null;
          const own = typeText.includes('own');
          goals.push({ name, clock, isHome, own });
        }
      }
    } catch(_) {}
  }

  if (!document.getElementById('m-scorers')) return; // モーダルが閉じられていたら終了
  const elNow = document.getElementById('m-scorers');
  if (!elNow) return;

  if (goals.length === 0) { elNow.innerHTML = ''; return; }

  // ホーム・アウェイ分類（isHomeが不明な場合は1カラム表示）
  const hasTeamInfo = goals.every(g => g.isHome !== null);
  const homeGoals = goals.filter(g => g.isHome === true);
  const awayGoals = goals.filter(g => g.isHome === false);

  const hT = team(homeKey);
  const aT = team(awayKey);
  const hName = hT ? hT.n : homeKey;
  const aName = aT ? aT.n : awayKey;

  function goalItem(g) {
    return `<div style="font-size:12px;color:var(--txt1);padding:2px 0">
      ⚽ <span style="font-weight:700">${g.name}${g.own?' <span style="color:var(--red);font-size:11px">(OG)</span>':''}</span>${g.clock?` <span style="color:var(--txt3);font-size:11px">${g.clock}</span>`:''}
    </div>`;
  }

  // チーム判定ができた場合は2カラム、できない場合は1カラム
  const bodyHtml = hasTeamInfo
    ? `<div style="display:flex;gap:8px">
        <div style="flex:1">
          <div style="font-size:10px;color:var(--txt3);font-weight:700;margin-bottom:4px">${hName}</div>
          ${homeGoals.length ? homeGoals.map(goalItem).join('') : '<div style="font-size:11px;color:var(--txt3)">—</div>'}
        </div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="flex:1">
          <div style="font-size:10px;color:var(--txt3);font-weight:700;margin-bottom:4px">${aName}</div>
          ${awayGoals.length ? awayGoals.map(goalItem).join('') : '<div style="font-size:11px;color:var(--txt3)">—</div>'}
        </div>
      </div>`
    : goals.map(goalItem).join('');

  elNow.innerHTML = `
    <div style="background:var(--card2);border-radius:10px;padding:12px 14px;margin-top:4px">
      <div style="font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--txt3);margin-bottom:8px;text-align:center">⚽ ゴール</div>
      ${bodyHtml}
    </div>`;
}

  const hName = isTBD?(m.homeLabel||'未定'):h.n;

  const hFi = isTBD?'❓':fi(h.code,'fi-hero');
  const aFi = isTBD?'❓':fi(a.code,'fi-hero');
  const timeDisp = m.jst || m.time || '—';

  const isModalLive = m.liveStatus === 'IN_PLAY' || m.liveStatus === 'PAUSED';
  const scoreHtml = isModalLive

  const mAClick = !isTBD?`onclick="closeModal();setTimeout(()=>openTeamModal('${m.away}'),50)"`:''

  document.getElementById('modalContent').innerHTML = `
    <div class="m-phase">${phaseName(m.type)}${m.group?' — グループ '+m.group+' — MD'+m.md:m.matchNum?' — 試合 '+m.matchNum:''}</div>

    <div class="m-vs">
      <div class="m-team tappable" style="cursor:${isTBD?'default':'pointer'}" ${mHClick}>
        ${hFi}
        <div class="m-tname">${hName}</div>
        ${!isTBD?`<div class="m-conf">${h.c}${h.host?' 🏠':''}</div>`:''}
      </div>
      <div class="m-scorebox">${scoreHtml}</div>
      <div class="m-team tappable" style="cursor:${isTBD?'default':'pointer'}" ${mAClick}>
        ${aFi}
        <div class="m-tname">${aName}</div>
        ${!isTBD?`<div class="m-conf">${a.c}${a.host?' 🏠':''}</div>`:''}
      </div>
    </div>
    <div class="info-grid">
      <div class="info-item"><div class="info-lbl">📍 スタジアム</div><div class="info-val">${vd.name||m.venueCity||'—'}</div></div>
      <div class="info-item"><div class="info-lbl">🏙 都市</div><div class="info-val">${vd.code?fi(vd.code,'fi-s'):''} ${vd.city||m.venueCity||'—'}</div></div>
      <div class="info-item"><div class="info-lbl">👥 収容人数</div><div class="info-val">${vd.cap?vd.cap.toLocaleString()+'人':'—'}</div></div>
      <div class="info-item"><div class="info-lbl">⏰ キックオフ</div><div class="info-val">${timeDisp}</div></div>
    </div>
    <div id="m-scorers" style="margin-top:12px;min-height:0"></div>`;
  openOverlay();
  // 得点者情報を非同期取得（スコアがある試合のみ）
  if (m.hs !== null && m.espnEventId) {
    fetchAndShowScorers(m.espnEventId, m.home, m.away, m.espnHomeId, m.espnAwayId);
  }
}

function openTeamModal(tk) {
  const t = team(tk);
  const myGroup = Object.entries(GROUPS).find(([,ts])=>ts.includes(tk))?.[0];
  const myMatches = allMatches
    .filter(m=>m.home===tk||m.away===tk)
    .sort((a,b)=>a.date.localeCompare(b.date));
  const sq = SQUADS[tk]||[];

  function matchRow(m) {
    const isHome = m.home===tk;
    const oppKey = isHome?m.away:m.home;
    const opp = oppKey==='TBD'
      ?{n:isHome?m.awayLabel||'未定':m.homeLabel||'未定',code:''}
      :team(oppKey);
    const f = fmtDate(m.jstDate||m.date);
    const hasScore = m.hs!==null;
    const myScore = isHome?m.hs:m.as;
    const oppScore = isHome?m.as:m.hs;
    const typeLabel = m.type==='group'?`G${m.group} MD${m.md}`:phaseName(m.type);
    const timeDisp = m.jst || m.time || '';
    let rc='var(--txt3)', rl='';
    if (hasScore) {
      if (myScore>oppScore){rc='var(--green)';rl='勝';}
      else if (myScore<oppScore){rc='var(--red)';rl='敗';}
      else {rc='var(--gold)';rl='分';}
    }
    return `<div class="tm-match-row" onclick="openMatchModal(${m.id})">
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:600">${f.full}${timeDisp?' · '+timeDisp:''} &nbsp;<span style="opacity:.7">${typeLabel}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          ${fi(opp.code,'fi-m')}
          <span style="font-size:15px;font-weight:700">${opp.n}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;padding-left:12px">
        ${hasScore
          ?`<div style="font-size:22px;font-weight:900;color:${rc};font-variant-numeric:tabular-nums">${myScore}–${oppScore}</div>
             <div style="font-size:12px;color:${rc};font-weight:800;margin-top:1px">${rl}</div>`
          :`<div style="font-size:14px;font-weight:800;color:var(--txt2)">${timeDisp||'—'}</div>
             <div style="font-size:11px;color:var(--txt3);margin-top:2px">予定</div>`}
      </div>
    </div>`;
  }

  const gMs = myMatches.filter(m=>m.type==='group');
  const kMs = myMatches.filter(m=>m.type!=='group');

  const sqHtml = sq.length?`<div class="m-sec">注目選手</div>${sq.map(p=>
    `<div class="squad-row">
      <div class="p-num">${p.num}</div>
      <div class="p-info"><div class="p-name">${p.name}</div><div class="p-pos">${p.pos}</div></div>
      <div class="p-club">${p.club}</div>
    </div>`
  ).join('')}`:'';

  const hist = WC_HISTORY[tk] || [];
  const histHtml = hist.length ? `<div style="display:flex;flex-direction:column;gap:5px;text-align:left">
    <div style="font-size:10px;color:var(--txt3);font-weight:800;letter-spacing:.5px;margin-bottom:2px">過去3大会</div>
    ${hist.map(h => {
      let c = 'var(--txt3)';
      if (h.r.includes('優勝')) c = 'var(--gold)';
      else if (h.r.includes('準優勝')||h.r==='3位'||h.r==='4位') c = 'var(--green)';
      else if (h.r.includes('準々')||h.r.includes('ベスト')) c = 'var(--txt2)';
      return `<div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:11px;color:var(--txt3);min-width:32px">${h.y}</span>
        <span style="font-size:12px;font-weight:800;color:${c}">${h.r}</span>
      </div>`;
    }).join('')}
  </div>` : '';

  document.getElementById('modalContent').innerHTML = `
    <div class="tm-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;padding:0 12px">
        ${fi(t.code,'fi-hero')}
        ${histHtml}
      </div>
      <div class="tm-name">${t.n}</div>
      <div class="tm-sub">${t.c}${t.host?' &nbsp;🏠 開催国':''}</div>
      ${myGroup?`<div class="tm-group-badge">グループ ${myGroup}</div>`:''}
    </div>
    ${gMs.length?`<div class="m-sec">グループステージ</div>${gMs.map(matchRow).join('')}`:''}
    ${kMs.length?`<div class="m-sec">ノックアウトステージ</div>${kMs.map(matchRow).join('')}`:''}
    ${sqHtml}`;
  openOverlay();
}

function openOverlay(){document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}

// ═══════════════════ カウントダウンタイマー ═══════════════════
let _cdInterval = null;
function pad2(n){return String(n).padStart(2,'0');}

function tickCountdowns() {
  const now = Date.now();
  document.querySelectorAll('.mc-countdown[data-ts]').forEach(el => {
    const ts = parseInt(el.dataset.ts);
    const diff = ts - now;
    const id = el.id.replace('cd-','');
    if (diff <= 0) {
      el.style.display = 'none'; // 開始時刻超過 → カウントダウンを非表示（LIVEはFD.org由来のliveStatusで制御）
      return;
    }
    const totalSec = Math.floor(diff / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    const dEl = document.getElementById('cd-d-'+id);
    const hEl = document.getElementById('cd-h-'+id);
    const mEl = document.getElementById('cd-m-'+id);
    const sEl = document.getElementById('cd-s-'+id);
    if (dEl) dEl.textContent = d;
    if (hEl) hEl.textContent = pad2(h);
    if (mEl) mEl.textContent = pad2(m);
    if (sEl) sEl.textContent = pad2(s);
  });
}

function startCountdownTimer() {
  if (_cdInterval) clearInterval(_cdInterval);
  tickCountdowns();
  _cdInterval = setInterval(tickCountdowns, 1000);
}

let touchY=0;
document.getElementById('modal').addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;},{passive:true});
document.getElementById('modal').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-touchY>80)closeModal();},{passive:true});

// ═══════════════════ 予想機能 ═══════════════════
let PRED = {groups:{}, knockout:{}};

function loadPred(){
  try{const s=localStorage.getItem('wc2026_pred');if(s){const p=JSON.parse(s);PRED.groups=p.groups||{};PRED.knockout=p.knockout||{};}}catch(e){}
}
function savePred(){
  try{localStorage.setItem('wc2026_pred',JSON.stringify(PRED));}catch(e){}
}
function initGroupPreds(){
  Object.keys(GROUPS).forEach(g=>{
    if(!PRED.groups[g]||!PRED.groups[g].length) PRED.groups[g]=[...GROUPS[g]];
  });
}

function moveTeam(g,idx,dir){ moveTeamPred(g,idx,dir); }

function resolvePredLabel(label){
  if(!label)return null;
  // "3A/B/C/D/F" → 複数グループ候補はセンチネルとして保持
  if(label.match(/^3[A-L]\//) ) return '__3RD__'+label;
  // "1A","2B","3A" format
  const posM=label.match(/^([1-4])([A-L])$/);
  if(posM){
    const pos=parseInt(posM[1])-1;
    const g=posM[2];
    // 実際の試合結果がある場合は現在のスタンディング順位を優先
    const standings = computeGroupStandings(g);
    if (standings.some(s => s.played > 0) && standings[pos]) {
      return standings[pos].team;
    }
    return(PRED.groups[g]||GROUPS[g]||[])[pos]||null;
  }
  // "W73" = 試合番号73の勝者
  const winM=label.match(/^W(\d+)$/);
  if(winM){
    const m=matchByApiNum[parseInt(winM[1])];
    if(!m)return null;
    return realMatchWinner(m)||PRED.knockout[m.phase+'_'+m.matchNum]||null;
  }
  return null;
}

function realMatchWinner(m){
  if(m.hs===null||m.as===null)return null;
  if(m.hs>m.as)return m.home!=='TBD'?m.home:null;
  if(m.as>m.hs)return m.away!=='TBD'?m.away:null;
  return null;
}

function getMatchWinner(phase,num){
  const m=koMatches.find(x=>x.phase===phase&&x.matchNum===num);
  if(!m)return null;
  return realMatchWinner(m)||PRED.knockout[phase+'_'+num]||null;
}

function getEffTeam(m,side){
  const key=side==='home'?m.home:m.away;
  const label=side==='home'?m.homeLabel:m.awayLabel;
  if(key&&key!=='TBD')return{key,isPred:false};
  if(label){const r=resolvePredLabel(label);if(r)return{key:r,isPred:true};}
  return{key:null,isPred:false};
}

// "3A/B/C/D/F" → 各グループの予想3位チームの国旗HTML
function third3Flags(label){
  const m=label&&label.match(/^3([A-L](?:\/[A-L])*)/);
  if(!m)return null;
  const groups=m[1].split('/');
  const flags=groups.map(g=>{
    const tk=(PRED.groups[g]||GROUPS[g]||[])[2];
    return tk?fi(team(tk).code,'fi-s'):'';
  }).filter(Boolean);
  return flags.length?{flags,groups}:null;
}

function setPredWinner(phase,num,winnerKey){
  const k=phase+'_'+num;
  if(PRED.knockout[k]===winnerKey)delete PRED.knockout[k];
  else PRED.knockout[k]=winnerKey;
  const phases=['r32','r16','qf','sf','final'];
  const pi=phases.indexOf(phase);
  for(let i=pi+1;i<phases.length;i++){
    Object.keys(PRED.knockout).filter(k=>k.startsWith(phases[i]+'_')).forEach(k=>delete PRED.knockout[k]);
  }
  savePred();
  const bw = document.querySelector('.bracket-wrap');
  const sl = bw ? bw.scrollLeft : 0;
  const st = window.scrollY;
  renderTournament();
  const bw2 = document.querySelector('.bracket-wrap');
  if(bw2) bw2.scrollLeft = sl;
  window.scrollTo(0, st);
}

function switchTab(tab) {

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

function updateFdStatusLabel() {

  const el = document.getElementById('fdStatus');
  if (el) el.style.display = '';
}

function updateLastUpdatedLabel() {
  const el = document.getElementById('lastUpdated');
  if (!el) return;
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  el.textContent = `最終更新: ${h}:${m}:${s}`;
}

// ═══════════════════ 手動更新 ═══════════════════
let _refreshing = false;
async function manualRefresh() {
  if (_refreshing) return;
  await refreshData(true);
}

// ═══════════════════ データ更新共通処理 ═══════════════════
async function refreshData(isManual = false) {
  if (_refreshing) return;
  _refreshing = true;
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('spinning');
  try {
    const data = await loadData();
    const prevScores = {};
    allMatches.forEach(m => { prevScores[m.id] = {hs:m.hs, as:m.as}; });

    processData(data);
    matchByApiNum = {};
    koMatches.forEach(m=>{ if(m.apiNum) matchByApiNum[m.apiNum]=m; });
    initGroupPreds();
    await fetchEspnCoreScores();      // ESPN Core API でスコアを取得（無料・無制限）
    await fetchAndMergeLiveScores(); // FD.org ライブスコアをオーバーレイ（APIキー設定時）

    updateLastUpdatedLabel();

    // 現在表示中のタブを再描画
    const activeView = document.querySelector('.view.active');
    if (activeView) {
      const tab = activeView.id.replace('view-','');
      if (tab==='schedule') { buildDateScroll(); renderSchedule(); }
      else if (tab==='groups') { buildGroupFilter(); renderGroups(); }
      else if (tab==='tournament') { renderTournament(); }
      else if (tab==='predict') { renderPredict(); }
    }

    // スコアが変わった試合があればフラッシュ通知
    if (isManual) {
      let changed = 0;
      allMatches.forEach(m => {
        const prev = prevScores[m.id];
        if (prev && (prev.hs !== m.hs || prev.as !== m.as)) changed++;
      });
      if (changed > 0) showToast(`⚽ ${changed}試合のスコアが更新されました`);
      else showToast('✓ 最新データに更新済みです');
    }
  } catch(err) {
    if (isManual) showToast('⚠️ 更新に失敗しました: ' + err.message);
  } finally {
    _refreshing = false;
    if (btn) btn.classList.remove('spinning');
  }
}

// ═══════════════════ トースト通知 ═══════════════════
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:calc(var(--tab-h)+20px);left:50%;transform:translateX(-50%);background:#1a2540;border:1px solid var(--green);color:var(--txt);padding:10px 18px;border-radius:11px;font-size:14px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// ═══════════════════ 自動更新タイマー ═══════════════════
const AUTO_REFRESH_MS = 60 * 1000; // 60秒
let _autoRefreshTimer = null;

function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => { refreshData(false); }, AUTO_REFRESH_MS);
}

// ═══════════════════ 初期化 ═══════════════════
async function init() {
  try {
    const data = await loadData();
    processData(data);
    matchByApiNum = {};
    koMatches.forEach(m=>{ if(m.apiNum) matchByApiNum[m.apiNum]=m; });
    loadPred();
    initGroupPreds();
    const allDates = [...new Set(allMatches.map(m=>m.jstDate||m.date))].sort();
    // 今日のJST日付を基準に選択日を決定
    const nowJST = new Date(Date.now() + 9*3600*1000);
    const todayJST = nowJST.toISOString().slice(0,10);
    selDate = allDates.includes(todayJST) ? todayJST          // 今日に試合あり
            : allDates.filter(d => d <= todayJST).slice(-1)[0] // 今日以前で最近
            || allDates[0]
            || '2026-06-12';
    document.getElementById('scheduleLoading').style.display='none';
    document.getElementById('scheduleReady').style.display='block';
    buildDateScroll();
    renderSchedule();
    buildGroupFilter();
    renderGroups();
    await fetchEspnCoreScores();      // ESPN Core API でスコアを取得（無料・無制限）
    await fetchAndMergeLiveScores(); // FD.org ライブスコアをオーバーレイ（APIキー設定時）
    // スコア取得後に再描画（初期表示に結果を反映）
    buildDateScroll();
    renderSchedule();
    renderGroups();
    renderTournament();
    renderPredict();
    updateLastUpdatedLabel();
    updateFdStatusLabel();
    startAutoRefresh();
  } catch(err) {
    document.getElementById('scheduleLoading').innerHTML=`
      <div class="error-box">
        <p>⚠️ データの取得に失敗しました</p>
        <p style="font-size:14px;color:var(--txt3);margin-bottom:12px">${err.message}</p>
        <button class="retry-btn" onclick="init()">再試行</button>
      </div>`;
  }
}

init();
